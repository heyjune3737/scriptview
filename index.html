<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════
// ScriptView — 대본 뷰어 & 에디터 (PWA)
// ══════════════════════════════════════════

const CHAR_COLORS = ['char-hl-0','char-hl-1','char-hl-2','char-hl-3','char-hl-4','char-hl-5'];

// ─── State ───
let state = {
  blocks: [],
  metadata: { title: '', info: [] },
  fileName: '',
  darkMode: localStorage.getItem('sv-dark') === '1',
  showOutline: false,
  showStats: false,
  showSearch: false,
  searchQuery: '',
  searchResults: [],
  searchIdx: -1,
  editingId: null,
  editText: '',
  charColors: {},
  highlightChar: null,
  editMode: false,
  toast: ''
};

// ─── Inline Markdown ───
function parseInline(text) {
  // Escape HTML first, then apply bold/italic markdown
  return esc(text)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}

// ─── Markdown Parser ───
function parseScript(md) {
  const lines = md.split('\n');
  const blocks = [];
  const metadata = { title: '', info: [] };
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];
    const t = line.trim();
    if (t === '') { i++; continue; }
    if (/^-{3,}$/.test(t)) { blocks.push({ type: 'hr', text: '', id: blocks.length }); i++; continue; }
    if (/^# /.test(t)) {
      metadata.title = t.replace(/^# /, '');
      blocks.push({ type: 'title', text: metadata.title, id: blocks.length }); i++; continue;
    }
    if (/^\*\*[^*]+\*\*$/.test(t) && blocks.length <= 5 && blocks.some(b => b.type === 'title')) {
      const txt = t.replace(/\*\*/g, '');
      metadata.info.push(txt);
      blocks.push({ type: 'metadata', text: txt, id: blocks.length }); i++; continue;
    }
    if (/^## /.test(t)) { blocks.push({ type: 'act', text: t.replace(/^## /, ''), id: blocks.length }); i++; continue; }
    if (/^### /.test(t)) {
      blocks.push({ type: 'scene', text: t.replace(/^### /, ''), id: blocks.length }); i++;
      if (i < lines.length && /^ {4}/.test(lines[i]) && lines[i].trim()) {
        blocks.push({ type: 'slugline', text: lines[i].trim(), id: blocks.length }); i++;
      }
      continue;
    }
    if (/^ {4}/.test(line) && t) { blocks.push({ type: 'slugline', text: t, id: blocks.length }); i++; continue; }
    if (/^\|/.test(t)) {
      let tRows = [t]; i++;
      while (i < lines.length && /^\|/.test(lines[i].trim())) { tRows.push(lines[i].trim()); i++; }
      blocks.push({ type: 'table', text: tRows.join('\n'), id: blocks.length }); continue;
    }
    if (/^\*\*SFX\*\*/.test(t)) { blocks.push({ type: 'sfx', text: t.replace(/\*\*/g, ''), id: blocks.length }); i++; continue; }
    if (/^\*\*V\.O/.test(t)) { blocks.push({ type: 'vo', text: t.replace(/\*\*/g, ''), id: blocks.length }); i++; continue; }
    if (/^\*\*\[/.test(t) || /^\*\*(INSERT|MONTAGE|FLASHBACK|CUT TO|FADE|INTERCUT)/.test(t)) {
      blocks.push({ type: 'transition', text: t.replace(/\*\*/g, ''), id: blocks.length }); i++; continue;
    }
    if (/^\*\*[^*]+\*\*:?/.test(t) && t.replace(/\*\*/g,'').length < 60) {
      const inner = t.replace(/\*\*/g,'');
      if (/^(SFX|BGM|V\.O|INSERT|CUT|FADE|FLASH|TITLE|자막|MONTAGE|INTERCUT)/i.test(inner)) {
        blocks.push({ type: 'sfx', text: inner, id: blocks.length }); i++; continue;
      }
    }

    // Character detection
    const isChar = t.length <= 30 && !t.endsWith('.') && !t.endsWith('다.') && !t.endsWith('다')
      && !t.startsWith('*') && !t.startsWith('#') && /^[가-힣a-zA-Z0-9\s()（）/]+$/.test(t);

    if (isChar) {
      let j = i + 1;
      while (j < lines.length && lines[j].trim() === '') j++;
      if (j < lines.length) {
        const nl = lines[j].trim();
        const nextIsMarkup = /^(#{1,3} |---|\*\*)/.test(nl);
        const nextIsShortName = nl.length <= 30 && /^[가-힣a-zA-Z0-9\s()（）/]+$/.test(nl) && !nl.endsWith('.');
        if (!nextIsMarkup && !nextIsShortName && nl.length > 0) {
          blocks.push({ type: 'character', text: t, id: blocks.length }); i++;
          let dLines = [];
          while (i < lines.length && lines[i].trim() !== '') { dLines.push(lines[i].trim()); i++; }
          if (dLines.length) blocks.push({ type: 'dialogue', text: dLines.join('\n'), id: blocks.length });
          continue;
        }
      }
    }

    // Direction
    let dLines = [t]; i++;
    while (i < lines.length && lines[i].trim() !== '' && !/^(#{1,3} |---|\*\*(SFX|V\.O|INSERT|\[))/.test(lines[i].trim())) {
      const nt = lines[i].trim();
      const maybeChar = nt.length <= 30 && /^[가-힣a-zA-Z0-9\s()（）/]+$/.test(nt) && !nt.endsWith('.');
      if (maybeChar) break;
      dLines.push(nt); i++;
    }
    blocks.push({ type: 'direction', text: dLines.join(' '), id: blocks.length });
  }
  return { metadata, blocks };
}

// ─── Blocks → Markdown ───
function toMarkdown(blocks) {
  let md = '';
  for (const b of blocks) {
    switch (b.type) {
      case 'title': md += `# ${b.text}\n\n`; break;
      case 'metadata': md += `**${b.text}**\n`; break;
      case 'hr': md += `---\n\n`; break;
      case 'act': md += `## ${b.text}\n\n`; break;
      case 'scene': md += `### ${b.text}\n\n`; break;
      case 'slugline': md += `    ${b.text}\n\n`; break;
      case 'character': md += `${b.text}\n`; break;
      case 'dialogue': md += `${b.text}\n\n`; break;
      case 'direction': md += `${b.text}\n\n`; break;
      case 'sfx': case 'vo': md += `**${b.text}**\n\n`; break;
      case 'transition': md += `**${b.text}**\n\n`; break;
      case 'table': md += `${b.text}\n\n`; break;
    }
  }
  return md;
}

// ─── Character Stats ───
function getCharStats(blocks) {
  const stats = {};
  for (let i = 0; i < blocks.length; i++) {
    if (blocks[i].type === 'character') {
      const name = blocks[i].text;
      if (!stats[name]) stats[name] = { lines: 0, chars: 0 };
      stats[name].lines++;
      if (i + 1 < blocks.length && blocks[i + 1].type === 'dialogue') {
        stats[name].chars += blocks[i + 1].text.length;
      }
    }
  }
  return Object.entries(stats).sort((a, b) => b[1].lines - a[1].lines);
}

function getCharColor(name) {
  if (!state.charColors[name]) {
    const idx = Object.keys(state.charColors).length % CHAR_COLORS.length;
    state.charColors[name] = CHAR_COLORS[idx];
  }
  return state.charColors[name];
}

// ─── Search ───
function doSearch(query) {
  if (!query) { state.searchResults = []; state.searchIdx = -1; return; }
  const q = query.toLowerCase();
  state.searchResults = state.blocks.filter(b => b.text.toLowerCase().includes(q)).map(b => b.id);
  state.searchIdx = state.searchResults.length > 0 ? 0 : -1;
}

// ─── Toast ───
function showToast(msg) {
  state.toast = msg; render();
  setTimeout(() => { state.toast = ''; render(); }, 2000);
}

// ─── Actions ───
function loadScript(text, name) {
  const { metadata, blocks } = parseScript(text);
  state.metadata = metadata;
  state.blocks = blocks;
  state.fileName = name || 'script.md';
  state.charColors = {};
  // Assign colors
  blocks.filter(b => b.type === 'character').forEach(b => getCharColor(b.text));
  // Auto-save
  try { localStorage.setItem('sv-script', text); localStorage.setItem('sv-filename', state.fileName); } catch(e) {}
  render();
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadScript(e.target.result, file.name);
  reader.readAsText(file);
}

function exportMd() {
  const md = toMarkdown(state.blocks);
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = state.fileName || 'script.md';
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ 마크다운 저장 완료');
}

function exportPdf() {
  // 다크모드면 인쇄용으로 임시 라이트모드 전환
  const wasDark = state.darkMode;
  if (wasDark) document.body.classList.remove('dark');
  // 사이드바/패널 닫기
  const wasOutline = state.showOutline;
  const wasStats = state.showStats;
  state.showOutline = false;
  state.showStats = false;
  render();
  setTimeout(() => {
    window.print();
    // 원복
    if (wasDark) document.body.classList.add('dark');
    state.showOutline = wasOutline;
    state.showStats = wasStats;
    render();
  }, 100);
}

function startEdit(id) {
  const b = state.blocks.find(x => x.id === id);
  if (!b || b.type === 'hr') return;
  state.editingId = id;
  state.editText = b.text;
  render();
  setTimeout(() => {
    const el = document.getElementById('edit-field');
    if (el) { el.focus(); el.selectionStart = el.value.length; }
  }, 20);
}

function finishEdit() {
  if (state.editingId === null) return;
  const b = state.blocks.find(x => x.id === state.editingId);
  if (b && state.editText !== b.text) {
    b.text = state.editText;
    // Auto-save
    try { localStorage.setItem('sv-script', toMarkdown(state.blocks)); } catch(e) {}
  }
  state.editingId = null;
  render();
}

function scrollToBlock(id) {
  const el = document.getElementById('b-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ─── Render ───
function render() {
  const app = document.getElementById('app');
  document.body.className = state.darkMode ? 'dark' : '';

  if (state.blocks.length === 0) {
    app.innerHTML = renderLanding();
    bindLanding();
    return;
  }

  let html = '';

  // Toolbar
  html += `<div class="toolbar">
    <button class="toolbar-btn ${state.showOutline ? 'active' : ''}" id="btn-outline">${state.showOutline ? '◀' : '☰'} 목차</button>
    <button class="toolbar-btn" id="btn-search">🔍 검색</button>
    <button class="toolbar-btn ${state.highlightChar ? 'active' : ''}" id="btn-char-toggle">👤 캐릭터</button>
    <span class="toolbar-spacer"></span>
    <span class="toolbar-filename">${esc(state.fileName)}</span>
    <span class="toolbar-spacer"></span>
    <button class="toolbar-btn" id="btn-stats">📊 통계</button>
    <button class="toolbar-btn" id="btn-open">📂 열기</button>
    <button class="toolbar-btn" id="btn-save">💾 저장</button>
    <button class="toolbar-btn" id="btn-pdf">📄 PDF</button>
    <button class="toolbar-btn ${state.editMode ? 'active' : ''}" id="btn-edit-mode">✏️ 편집</button>
    <button class="toolbar-btn" id="btn-dark" style="font-size:16px;padding:4px 8px">${state.darkMode ? '☀️' : '🌙'}</button>
    ${_installPrompt ? `<button class="toolbar-btn" id="btn-install" style="background:var(--accent);color:#fff;border-color:var(--accent)">⬇️ 설치</button>` : ''}
    <input type="file" accept=".md,.txt" id="file-input" style="display:none">
  </div>`;

  // Sidebar
  const scenes = state.blocks.filter(b => b.type === 'scene' || b.type === 'act');
  html += `<div class="sidebar ${state.showOutline ? 'open' : ''}" id="sidebar">
    <div class="sidebar-header">씬 목차 (${state.blocks.filter(b=>b.type==='scene').length}씬)</div>
    ${scenes.map(s => `<div class="sidebar-item ${s.type}" data-scroll="${s.id}">${esc(s.text)}</div>`).join('')}
  </div>`;

  // Stats panel
  const charStats = getCharStats(state.blocks);
  const maxLines = charStats.length > 0 ? charStats[0][1].lines : 1;
  html += `<div class="stats-panel ${state.showStats ? 'open' : ''}" id="stats-panel">
    <div class="stats-header">캐릭터별 대사 통계</div>
    <div style="padding:12px 16px;font-size:12px;color:var(--muted)">
      총 씬: ${state.blocks.filter(b=>b.type==='scene').length}개 &nbsp;|&nbsp;
      총 대사: ${charStats.reduce((s,c)=>s+c[1].lines,0)}개 &nbsp;|&nbsp;
      캐릭터: ${charStats.length}명
    </div>
    ${charStats.map(([name, s]) => {
      const pct = Math.round(s.lines / maxLines * 100);
      const cl = getCharColor(name);
      return `<div class="stat-row" data-char="${esc(name)}" style="cursor:pointer">
        <span class="stat-name ${cl}">${esc(name)}</span>
        <div class="stat-bar-wrap"><div class="stat-bar ${cl}" style="width:${pct}%;background:currentColor;opacity:0.5"></div></div>
        <span class="stat-count">${s.lines}대사</span>
      </div>`;
    }).join('')}
  </div>`;

  // Overlay
  if (state.showOutline || state.showStats) {
    html += `<div class="overlay" id="overlay"></div>`;
  }

  // Search bar
  if (state.showSearch) {
    const info = state.searchResults.length > 0 ? `${state.searchIdx + 1}/${state.searchResults.length}` : '';
    html += `<div class="search-bar" id="search-bar">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="검색어 입력..." value="${esc(state.searchQuery)}">
      <span class="search-info">${info}</span>
      <button class="toolbar-btn" id="search-prev" style="padding:2px 6px">▲</button>
      <button class="toolbar-btn" id="search-next" style="padding:2px 6px">▼</button>
      <button class="toolbar-btn" id="search-close" style="padding:2px 8px">✕</button>
    </div>`;
  }

  // Page content
  html += `<div class="page-wrap" id="page-wrap">
    <div class="page" id="page">
      ${state.blocks.map(b => renderBlock(b)).join('')}
    </div>
  </div>`;

  // Toast
  html += `<div class="toast ${state.toast ? 'show' : ''}">${esc(state.toast)}</div>`;

  app.innerHTML = html;
  bindEvents();
}

function renderBlock(b) {
  const isEditing = state.editingId === b.id;
  const isSearchHit = state.searchResults.includes(b.id);
  const isCurrentHit = state.searchIdx >= 0 && state.searchResults[state.searchIdx] === b.id;
  const highlight = isCurrentHit ? 'outline:2px solid var(--orange);outline-offset:2px;' : (isSearchHit ? 'outline:1px dashed var(--accent);outline-offset:2px;' : '');

  // Character highlight filter
  if (state.highlightChar) {
    if (b.type === 'character' && b.text !== state.highlightChar) {
      return `<div id="b-${b.id}" style="opacity:0.2">${renderBlockInner(b, isEditing, highlight)}</div>`;
    }
    if (b.type === 'dialogue') {
      const prevBlock = state.blocks[state.blocks.indexOf(b) - 1];
      if (prevBlock && prevBlock.type === 'character' && prevBlock.text !== state.highlightChar) {
        return `<div id="b-${b.id}" style="opacity:0.2">${renderBlockInner(b, isEditing, highlight)}</div>`;
      }
    }
  }

  return `<div id="b-${b.id}">${renderBlockInner(b, isEditing, highlight)}</div>`;
}

function renderBlockInner(b, isEditing, highlight) {
  if (b.type === 'hr') return `<hr class="block-hr">`;

  if (isEditing) {
    const isMulti = b.type === 'dialogue' || b.type === 'direction';
    if (isMulti) {
      return `<textarea id="edit-field" class="edit-textarea" style="${getBlockStyle(b)}${highlight}">${esc(state.editText)}</textarea>`;
    }
    return `<input id="edit-field" class="edit-input" style="${getBlockStyle(b)}${highlight}" value="${esc(state.editText)}">`;
  }

  switch (b.type) {
    case 'title': return `<div class="block block-title" data-edit="${b.id}" style="${highlight}">${parseInline(b.text)}</div>`;
    case 'metadata': return `<div class="block block-metadata" data-edit="${b.id}" style="${highlight}">${parseInline(b.text)}</div>`;
    case 'act': return `<div class="block block-act" data-edit="${b.id}" style="${highlight}">${parseInline(b.text)}</div>`;
    case 'scene': {
      const m = b.text.match(/S#(\d+)/);
      const badge = m ? `<span class="scene-badge">${m[1]}</span>` : '';
      return `<div class="block block-scene" data-edit="${b.id}" style="${highlight}">${badge}<span class="scene-text">${parseInline(b.text)}</span></div>`;
    }
    case 'slugline': return `<div class="block block-slugline" data-edit="${b.id}" style="${highlight}">${parseInline(b.text)}</div>`;
    case 'character': {
      const cl = getCharColor(b.text);
      return `<div class="block block-character ${cl}" data-edit="${b.id}" style="${highlight}">${esc(b.text)}</div>`;
    }
    case 'dialogue': return `<div class="block block-dialogue" data-edit="${b.id}" style="${highlight}">${parseInline(b.text)}</div>`;
    case 'direction': return `<div class="block block-direction" data-edit="${b.id}" style="${highlight}">${parseInline(b.text)}</div>`;
    case 'sfx': case 'vo': return `<div class="block block-sfx" data-edit="${b.id}" style="${highlight}">${esc(b.text)}</div>`;
    case 'transition': return `<div class="block block-transition" data-edit="${b.id}" style="${highlight}">${esc(b.text)}</div>`;
    case 'table': {
      const rows = b.text.split('\n').filter(r => r.trim());
      const isSep = r => /^\|[\s\-:|]+\|/.test(r.replace(/\s/g,''));
      let inHead = true;
      let tHtml = '<table>';
      rows.forEach(row => {
        if (isSep(row)) { inHead = false; return; }
        const cells = row.split('|').slice(1,-1).map(c => c.trim());
        const tag = inHead ? 'th' : 'td';
        tHtml += `<tr>${cells.map(c => `<${tag}>${parseInline(c)}</${tag}>`).join('')}</tr>`;
      });
      tHtml += '</table>';
      return `<div class="block block-table" data-edit="${b.id}" style="${highlight}">${tHtml}</div>`;
    }
    default: return `<div class="block" data-edit="${b.id}" style="${highlight}">${parseInline(b.text)}</div>`;
  }
}

function getBlockStyle(b) {
  const m = { title: 'font-size:26px;font-weight:900;text-align:center;', character: 'padding-left:100px;font-weight:800;', dialogue: 'padding-left:120px;font-size:15px;', act: 'font-size:18px;font-weight:800;' };
  return m[b.type] || '';
}

function renderLanding() {
  return `<div class="landing" id="landing">
    <div class="landing-icon">📜</div>
    <h1>ScriptView</h1>
    <p>마크다운(.md) 대본 파일을 불러오면<br>문서 양식으로 보여주고, 바로 편집할 수 있습니다.</p>
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📂</div>
      <div class="main-text">클릭하여 파일 선택</div>
      <div class="sub-text">또는 .md 파일을 여기에 드래그</div>
    </div>
    <input type="file" accept=".md,.txt" id="file-input-landing" style="display:none">
    <button class="demo-btn" id="demo-btn">데모 대본 보기</button>
    ${_installPrompt ? `<button class="demo-btn" id="btn-install-landing" style="margin-top:8px;border-color:var(--accent);color:var(--accent)">⬇️ 앱으로 설치 (데스크탑)</button>` : ''}
    <div style="position:fixed;bottom:16px;right:20px">
      <button id="dark-toggle-landing" style="background:none;border:none;font-size:22px;cursor:pointer;opacity:0.5">${state.darkMode ? '☀️' : '🌙'}</button>
    </div>
  </div>`;
}

// ─── Bind Events ───
function bindLanding() {
  const dz = document.getElementById('drop-zone');
  const fi = document.getElementById('file-input-landing');
  dz?.addEventListener('click', () => fi?.click());
  fi?.addEventListener('change', e => handleFile(e.target.files[0]));
  document.getElementById('demo-btn')?.addEventListener('click', () => loadScript(DEMO, '접신_데모.md'));
  document.getElementById('dark-toggle-landing')?.addEventListener('click', () => { state.darkMode = !state.darkMode; localStorage.setItem('sv-dark', state.darkMode ? '1' : '0'); render(); });
  document.getElementById('btn-install-landing')?.addEventListener('click', async () => { if (_installPrompt) { _installPrompt.prompt(); const { outcome } = await _installPrompt.userChoice; if (outcome === 'accepted') { _installPrompt = null; render(); } } });

  // Drag & drop
  document.body.addEventListener('dragover', e => { e.preventDefault(); dz?.classList.add('drag-over'); });
  document.body.addEventListener('dragleave', () => dz?.classList.remove('drag-over'));
  document.body.addEventListener('drop', e => { e.preventDefault(); dz?.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
}

function bindEvents() {
  // Toolbar
  document.getElementById('btn-outline')?.addEventListener('click', () => { state.showOutline = !state.showOutline; state.showStats = false; render(); });
  document.getElementById('btn-stats')?.addEventListener('click', () => { state.showStats = !state.showStats; state.showOutline = false; render(); });
  document.getElementById('btn-search')?.addEventListener('click', () => { state.showSearch = !state.showSearch; render(); setTimeout(() => document.getElementById('search-input')?.focus(), 50); });
  document.getElementById('btn-dark')?.addEventListener('click', () => { state.darkMode = !state.darkMode; localStorage.setItem('sv-dark', state.darkMode ? '1' : '0'); render(); });
  document.getElementById('btn-install')?.addEventListener('click', async () => { if (_installPrompt) { _installPrompt.prompt(); const { outcome } = await _installPrompt.userChoice; if (outcome === 'accepted') { _installPrompt = null; render(); } } });
  document.getElementById('btn-open')?.addEventListener('click', () => document.getElementById('file-input')?.click());
  document.getElementById('btn-save')?.addEventListener('click', exportMd);
  document.getElementById('btn-pdf')?.addEventListener('click', exportPdf);
  document.getElementById('btn-edit-mode')?.addEventListener('click', () => { state.editMode = !state.editMode; if (!state.editMode) { state.editingId = null; state.editText = ''; } render(); });
  document.getElementById('file-input')?.addEventListener('change', e => handleFile(e.target.files[0]));
  document.getElementById('overlay')?.addEventListener('click', () => { state.showOutline = false; state.showStats = false; render(); });

  // Character highlight toggle
  document.getElementById('btn-char-toggle')?.addEventListener('click', () => { state.highlightChar = null; state.showStats = !state.showStats; state.showOutline = false; render(); });

  // Sidebar scroll
  document.querySelectorAll('[data-scroll]').forEach(el => {
    el.addEventListener('click', () => { scrollToBlock(el.dataset.scroll); state.showOutline = false; render(); });
  });

  // Stats character click -> highlight
  document.querySelectorAll('[data-char]').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.char;
      state.highlightChar = state.highlightChar === name ? null : name;
      state.showStats = false;
      render();
    });
  });

  // Search
  document.getElementById('search-input')?.addEventListener('input', e => { state.searchQuery = e.target.value; doSearch(state.searchQuery); render(); setTimeout(() => { document.getElementById('search-input')?.focus(); if (state.searchIdx >= 0) scrollToBlock(state.searchResults[state.searchIdx]); }, 30); });
  document.getElementById('search-prev')?.addEventListener('click', () => { if (state.searchResults.length) { state.searchIdx = (state.searchIdx - 1 + state.searchResults.length) % state.searchResults.length; render(); scrollToBlock(state.searchResults[state.searchIdx]); }});
  document.getElementById('search-next')?.addEventListener('click', () => { if (state.searchResults.length) { state.searchIdx = (state.searchIdx + 1) % state.searchResults.length; render(); scrollToBlock(state.searchResults[state.searchIdx]); }});
  document.getElementById('search-close')?.addEventListener('click', () => { state.showSearch = false; state.searchQuery = ''; state.searchResults = []; state.searchIdx = -1; render(); });

  // Block editing
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', () => { if (state.editMode) startEdit(parseInt(el.dataset.edit)); });
  });

  // Edit field events
  const ef = document.getElementById('edit-field');
  if (ef) {
    ef.addEventListener('input', e => { state.editText = e.target.value; });
    ef.addEventListener('blur', finishEdit);
    ef.addEventListener('keydown', e => {
      if (e.key === 'Escape') { state.editText = state.blocks.find(b=>b.id===state.editingId)?.text || ''; finishEdit(); }
      const b = state.blocks.find(x => x.id === state.editingId);
      if (e.key === 'Enter' && !e.shiftKey && b && b.type !== 'dialogue' && b.type !== 'direction') { e.preventDefault(); finishEdit(); }
    });
  }

  // Drag & drop on page
  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });

  // Keyboard shortcuts
  document.onkeydown = e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); state.showSearch = true; render(); setTimeout(() => document.getElementById('search-input')?.focus(), 50); }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportMd(); }
  };
}

// ─── File Handling API (앱 아이콘에 파일 드래그) ───
function handleLaunchQueue() {
  if ('launchQueue' in window) {
    window.launchQueue.setConsumer(async (launchParams) => {
      if (!launchParams.files || launchParams.files.length === 0) return;
      const fileHandle = launchParams.files[0];
      const file = await fileHandle.getFile();
      const text = await file.text();
      loadScript(text, file.name);
    });
  }
}

// ─── Init ───
function init() {
  handleLaunchQueue();
  // Try restore from localStorage
  try {
    const saved = localStorage.getItem('sv-script');
    const savedName = localStorage.getItem('sv-filename');
    if (saved && saved.length > 10) {
      loadScript(saved, savedName || 'script.md');
      return;
    }
  } catch(e) {}
  render();
}

// Register service worker for PWA — force update on new version
if ('serviceWorker' in navigator) {
  caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k))));
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
  setTimeout(() => {
    navigator.serviceWorker.register('sw.js?v=2').catch(() => {});
  }, 500);
}

init();
</script>
